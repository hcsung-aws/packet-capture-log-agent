<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocol Agent</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 20px; }
h1 { color: #00d4ff; margin-bottom: 20px; font-size: 1.5em; }
.card { background: #16213e; border-radius: 8px; padding: 20px; margin-bottom: 16px; border: 1px solid #0f3460; }
.card h2 { color: #00d4ff; font-size: 1.1em; margin-bottom: 12px; }
label { display: block; margin-bottom: 4px; font-size: 0.9em; color: #a0a0a0; }
input, select { width: 100%; padding: 8px 12px; background: #0f3460; border: 1px solid #1a4080; border-radius: 4px; color: #e0e0e0; font-size: 0.95em; margin-bottom: 12px; }
button { padding: 10px 24px; background: #00d4ff; color: #1a1a2e; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.95em; }
button:hover { background: #00b8d4; }
button:disabled { background: #555; cursor: not-allowed; }
.status { padding: 8px 12px; border-radius: 4px; margin-top: 8px; font-size: 0.9em; }
.status.running { background: #1a4080; border-left: 3px solid #00d4ff; }
.status.success { background: #1a4020; border-left: 3px solid #00ff88; }
.status.error { background: #401a1a; border-left: 3px solid #ff4444; }
.result-summary { display: flex; gap: 20px; margin-top: 12px; }
.result-summary .stat { text-align: center; }
.result-summary .stat .num { font-size: 2em; color: #00d4ff; font-weight: bold; }
.result-summary .stat .label { font-size: 0.8em; color: #a0a0a0; }
pre { background: #0a0a1a; padding: 12px; border-radius: 4px; overflow-x: auto; font-size: 0.85em; max-height: 400px; overflow-y: auto; margin-top: 8px; }
.history { font-size: 0.85em; }
.history table { width: 100%; border-collapse: collapse; }
.history th, .history td { padding: 6px 8px; text-align: left; border-bottom: 1px solid #0f3460; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #00d4ff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <h1>⚡ Protocol Agent</h1>

  <div class="card">
    <h2>Generate Protocol</h2>
    <label>Source Directory (server-local path)</label>
    <input type="text" id="sourceDir" placeholder="/path/to/game/source">
    <label>Model (optional)</label>
    <select id="modelId">
      <option value="">Default (Sonnet 4)</option>
      <option value="us.anthropic.claude-3-5-haiku-20241022-v1:0">Haiku 3.5</option>
      <option value="us.anthropic.claude-3-7-sonnet-20250219-v1:0">Sonnet 3.7</option>
      <option value="us.anthropic.claude-sonnet-4-20250514-v1:0">Sonnet 4</option>
    </select>
    <button id="btnGenerate" onclick="generate()">Generate Protocol</button>
    <div id="statusArea"></div>
  </div>

  <div class="card" id="resultCard" style="display:none">
    <h2>Result</h2>
    <div class="result-summary" id="resultSummary"></div>
    <button onclick="showJson()">Show JSON</button>
    <button onclick="downloadJson()">Download</button>
    <pre id="jsonOutput" style="display:none"></pre>
  </div>

  <div class="card history">
    <h2>Recent Jobs</h2>
    <table><thead><tr><th>Job</th><th>Status</th><th>Result</th></tr></thead>
    <tbody id="jobsTable"></tbody></table>
  </div>
</div>

<script>
let currentJobId = null;
let pollTimer = null;

async function generate() {
  const sourceDir = document.getElementById('sourceDir').value.trim();
  if (!sourceDir) return alert('Enter source directory');

  document.getElementById('btnGenerate').disabled = true;
  setStatus('running', '<span class="spinner"></span>Uploading source files...');

  const resp = await fetch('/api/generate', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({source_dir: sourceDir, model_id: document.getElementById('modelId').value})
  });
  const data = await resp.json();
  if (data.error) { setStatus('error', data.error); document.getElementById('btnGenerate').disabled = false; return; }

  currentJobId = data.job_id;
  setStatus('running', '<span class="spinner"></span>Pipeline running... (this takes ~7 minutes)');
  pollTimer = setInterval(pollStatus, 5000);
}

async function pollStatus() {
  if (!currentJobId) return;
  const resp = await fetch(`/api/jobs/${currentJobId}`);
  const data = await resp.json();

  if (data.status === 'SUCCEEDED') {
    clearInterval(pollTimer);
    setStatus('success', `✓ Complete!`);
    showResult(data.result);
    document.getElementById('btnGenerate').disabled = false;
    refreshJobs();
  } else if (data.status === 'FAILED' || data.status === 'ERROR') {
    clearInterval(pollTimer);
    setStatus('error', `✗ ${data.status}: ${data.error || 'Check AWS console'}`);
    document.getElementById('btnGenerate').disabled = false;
  } else {
    setStatus('running', `<span class="spinner"></span>${data.status}...`);
  }
}

function setStatus(type, html) {
  document.getElementById('statusArea').innerHTML = `<div class="status ${type}">${html}</div>`;
}

function showResult(result) {
  const card = document.getElementById('resultCard');
  card.style.display = 'block';
  document.getElementById('resultSummary').innerHTML = `
    <div class="stat"><div class="num">${result.packet_count}</div><div class="label">Packets</div></div>
    <div class="stat"><div class="num">${result.type_count}</div><div class="label">Types</div></div>`;
}

async function showJson() {
  const pre = document.getElementById('jsonOutput');
  if (pre.style.display !== 'none') { pre.style.display = 'none'; return; }
  const resp = await fetch(`/api/jobs/${currentJobId}/result`);
  const data = await resp.json();
  pre.textContent = JSON.stringify(data, null, 2);
  pre.style.display = 'block';
}

function downloadJson() {
  if (!currentJobId) return;
  fetch(`/api/jobs/${currentJobId}/result`)
    .then(r => r.json())
    .then(data => {
      const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `protocol_${currentJobId}.json`; a.click();
    });
}

async function refreshJobs() {
  const resp = await fetch('/api/jobs');
  const jobs = await resp.json();
  const tbody = document.getElementById('jobsTable');
  tbody.innerHTML = Object.entries(jobs).map(([id, j]) =>
    `<tr><td>${id}</td><td>${j.status}</td><td>${j.result ? j.result.packet_count + ' packets' : '-'}</td></tr>`
  ).join('');
}

refreshJobs();
</script>
</body>
</html>
